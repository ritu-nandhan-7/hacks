<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Habits</title>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #1f2321;
    padding: 30px;
    color: #e8e6e3;
}

h1 {
    font-family: 'Georgia', serif;
    text-align: center;
    margin-bottom: 5px;
    color: #f1efe9;
}

.subtitle {
    text-align: center;
    color: #a8a6a2;
    margin-bottom: 30px;
}

.container {
    max-width: 600px;
    margin: auto;
}

.habit {
    background: #2a2f2c;
    padding: 18px;
    margin-bottom: 18px;
    border-radius: 18px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

.habit-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.habit-title {
    font-family: 'Georgia', serif;
    font-size: 18px;
}

.delete {
    cursor: pointer;
    color: #8b8883;
    font-size: 13px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 15px;
}

.cell {
    width: 100%;
    padding-top: 100%;
    background: #3a3f3c;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 16px;
    color: transparent;
}

.cell.active {
    background: #7c9a7e; /* muted sage */
    color: #1f2321;      /* tick color */
    font-weight: bold;
}

.cell:hover {
    opacity: 0.8;
}

.footer {
    margin-top: 12px;
    font-size: 12px;
    color: #9b9893;
}

.add-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: #7c9a7e;
    color: #1f2321;
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
}

.add-btn:hover {
    background: #6c8a6e;
}
</style>
</head>

<body>

<h1>My Habits</h1>
<div class="subtitle">Small steps, done often</div>

<div class="container" id="habitContainer"></div>

<button class="add-btn" onclick="addHabit()">+ Add a habit</button>

<script>
function createHabit(name="New Habit"){
    const habitDiv = document.createElement("div");
    habitDiv.className = "habit";

    habitDiv.innerHTML = `
        <div class="habit-header">
            <div class="habit-title">${name}</div>
            <div class="delete" onclick="this.closest('.habit').remove()">Remove</div>
        </div>
        <div class="grid"></div>
        <div class="footer">Consistency over perfection</div>
    `;

    const grid = habitDiv.querySelector(".grid");

    for(let i=0;i<28;i++){
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.onclick = () => cell.classList.toggle("active");
        grid.appendChild(cell);
    }

    document.getElementById("habitContainer").appendChild(habitDiv);
}

function addHabit(){
    const name = prompt("What habit are you building?");
    if(name) createHabit(name);
}

// Default habits
createHabit("Drink water");
createHabit("Move your body");
</script>

</body>

</html>
